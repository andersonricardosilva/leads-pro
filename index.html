<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Premium | AR Anderson Ricardo</title>
    
    <!-- Bibliotecas Externas -->
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #fff; }
        .gold-gradient { background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C); }
        .gold-text { background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // Chaves exclusivas para o GitHub
            const KEY_PERFIL = "ar_pro_perfil_github";
            const KEY_LEADS = "ar_pro_leads_github";

            const [perfil, setPerfil] = useState(() => {
                const saved = localStorage.getItem(KEY_PERFIL);
                return saved ? JSON.parse(saved) : { nome: "Anderson Ricardo", iniciais: "AR", foto: null };
            });

            const [leads, setLeads] = useState(() => {
                const saved = localStorage.getItem(KEY_LEADS);
                return saved ? JSON.parse(saved) : [];
            });

            const [form, setForm] = useState({ nome: "", telefone: "", interesse: "", status: "Quente", categoria: "Investidor", fotos: [] });
            const [busca, setBusca] = useState("");
            const [editandoPerfil, setEditandoPerfil] = useState(false);

            useEffect(() => { localStorage.setItem(KEY_PERFIL, JSON.stringify(perfil)); }, [perfil]);
            useEffect(() => { localStorage.setItem(KEY_LEADS, JSON.stringify(leads)); }, [leads]);

            const leadsFiltrados = useMemo(() => {
                return leads.filter(l => 
                    l.nome.toLowerCase().includes(busca.toLowerCase()) || 
                    l.interesse.toLowerCase().includes(busca.toLowerCase())
                );
            }, [leads, busca]);

            const handleFiles = (e, tipo) => {
                const files = Array.from(e.target.files);
                const reader = new FileReader();
                reader.onloadend = () => {
                    if (tipo === 'perfil') setPerfil({ ...perfil, foto: reader.result });
                    else setForm(prev => ({ ...prev, fotos: [...prev.fotos, reader.result].slice(0, 3) }));
                };
                reader.readAsDataURL(files[0]);
            };

            const salvarLead = (e) => {
                e.preventDefault();
                if (!form.nome || !form.telefone) return alert("Preencha Nome e Telefone!");
                setLeads([{ ...form, id: Date.now(), data: new Date().toLocaleDateString() }, ...leads]);
                setForm({ nome: "", telefone: "", interesse: "", status: "Quente", categoria: "Investidor", fotos: [] });
            };

            const enviarZap = (l, tipo) => {
                const num = l.telefone.replace(/\D/g, "");
                const saudacao = `Olá ${l.nome}, aqui é ${perfil.nome}. `;
                const texto = tipo === 'msg' 
                    ? `Vi seu interesse no ${l.interesse} em Maceió. Podemos conversar?` 
                    : `Surgiu uma oportunidade EXCLUSIVA para seu perfil em Maceió! Vamos conferir?`;
                window.open(`https://wa.me{num}?text=${encodeURIComponent(saudacao + texto)}`, "_blank");
            };

            return (
                <div className="min-h-screen p-4 max-w-xl mx-auto pb-20">
                    <header className="flex flex-col items-center py-8 text-center relative">
                        <div onClick={() => setEditandoPerfil(!editandoPerfil)} className="w-20 h-20 border-2 border-[#BF953F] flex items-center justify-center rounded-full mb-3 shadow-lg overflow-hidden cursor-pointer bg-[#111]">
                            {perfil.foto ? <img src={perfil.foto} className="w-full h-full object-cover" /> : <span className="text-2xl font-black gold-text italic">{perfil.iniciais}</span>}
                        </div>
                        
                        {editandoPerfil ? (
                            <div className="glass p-6 rounded-3xl absolute top-36 z-50 w-full shadow-2xl border border-[#BF953F]/30">
                                <h3 className="text-[10px] font-bold text-[#BF953F] uppercase mb-4 tracking-widest">Painel do Corretor</h3>
                                <input type="text" value={perfil.nome} onChange={(e) => setPerfil({...perfil, nome: e.target.value, iniciais: e.target.value.substring(0,2).toUpperCase()})} className="w-full p-3 bg-black border border-white/10 rounded-xl mb-4 outline-none text-sm" placeholder="Seu Nome" />
                                <label className="block p-3 gold-gradient text-black text-[10px] font-black rounded-xl cursor-pointer uppercase mb-4 text-center italic">Alterar Minha Foto <input type="file" onChange={(e) => handleFiles(e, "perfil")} className="hidden" /></label>
                                <button onClick={() => setEditandoPerfil(false)} className="w-full py-2 text-[10px] font-bold text-gray-500 uppercase">Salvar</button>
                            </div>
                        ) : (
                            <>
                                <h1 className="text-xl font-bold tracking-widest uppercase gold-text">{perfil.nome}</h1>
                                <p className="text-[9px] text-gray-600 uppercase tracking-[0.5em] mt-1 font-bold">Premium Lead Manager</p>
                            </>
                        )}
                    </header>

                    <form onSubmit={salvarLead} className="glass p-5 rounded-3xl mb-10 space-y-4 shadow-2xl border border-white/5">
                        <input type="text" placeholder="Nome do Cliente" value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} className="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-[#BF953F] text-sm" />
                        <div className="flex gap-2">
                            <input type="tel" placeholder="DDD + Número" value={form.telefone} onChange={e => setForm({...form, telefone: e.target.value})} className="flex-1 p-4 bg-white/5 border-l-4 border-[#BF953F] border-y border-white/10 border-r border-white/10 rounded-xl outline-none text-sm font-bold tracking-widest" />
                            <select value={form.categoria} onChange={e => setForm({...form, categoria: e.target.value})} className="p-3 bg-black border border-white/10 rounded-xl text-[10px] font-black text-[#BF953F] outline-none">
                                <option value="Investidor">INVESTIDOR</option>
                                <option value="Família">FAMÍLIA</option>
                                <option value="Studio">STUDIO</option>
                            </select>
                        </div>
                        <input type="text" placeholder="Empreendimento / Bairro" value={form.interesse} onChange={e => setForm({...form, interesse: e.target.value})} className="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none text-sm" />
                        <button className="w-full py-5 gold-gradient text-black font-black uppercase text-[10px] rounded-xl tracking-widest active:scale-95 transition-all">Salvar Lead Premium</button>
                    </form>

                    <div className="mb-8 px-1">
                        <input type="text" placeholder="🔍 Buscar por nome ou empreendimento..." value={busca} onChange={e => setBusca(e.target.value)} className="w-full p-4 glass rounded-2xl outline-none border border-white/5 text-sm italic" />
                    </div>

                    <div className="space-y-6">
                        {leadsFiltrados.map(l => (
                            <div key={l.id} className="glass rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl transition-all">
                                <div className="p-6">
                                    <div className="flex justify-between items-start mb-6 text-white">
                                        <div>
                                            <h4 className="font-bold text-base leading-tight">{l.nome}</h4>
                                            <p className="text-[10px] text-[#BF953F] font-bold uppercase tracking-widest mt-1 italic">{l.interesse}</p>
                                        </div>
                                        <div className="px-2 py-1 rounded-full text-[8px] font-black border border-orange-500 text-orange-500 uppercase">{l.status}</div>
                                    </div>
                                    <div className="flex flex-col gap-3">
                                        <button onClick={() => enviarZap(l, 'msg')} className="w-full bg-white/5 border border-white/10 py-4 rounded-2xl text-[10px] font-black uppercase text-gray-300">Falar no WhatsApp</button>
                                        <button onClick={() => enviarZap(l, 'oportunidade')} className="w-full bg-green-600 py-4 rounded-2xl text-[10px] font-black uppercase text-black shadow-lg">Enviar Lançamento</button>
                                    </div>
                                    <div className="flex justify-between items-center mt-6 pt-3 border-t border-white/5 text-[9px] text-gray-800 font-bold uppercase italic">
                                        <span>{l.data}</span>
                                        <button onClick={() => {if(confirm("Excluir?")) setLeads(leads.filter(x => x.id !== l.id))}} className="text-red-950 font-black">Excluir</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
